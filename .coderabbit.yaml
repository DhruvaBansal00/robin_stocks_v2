# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit config — free for public repos. This file only configures behavior;
# you must also install the CodeRabbit GitHub App (see repo setup notes).
language: en-US
reviews:
  # "chill" = fewer, higher-signal comments. Use "assertive" for stricter reviews.
  profile: chill
  # Don't block merges via the GitHub "request changes" state — keep it advisory.
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  tools:
    ruff:
      enabled: true
chat:
  auto_reply: true
