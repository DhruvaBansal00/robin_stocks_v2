name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel superseded runs on the same ref to save compute.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        # Pinned so a new ruff release can't turn CI red without a deliberate bump.
        run: pip install ruff==0.15.14
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mcp,dev]"
      - name: Run unit tests
        # Only the offline, mocked unit suites. tests/test_{robinhood,gemini,tda}.py
        # are live-credential integration tests and are intentionally excluded.
        run: pytest tests/sdk tests/mcp
